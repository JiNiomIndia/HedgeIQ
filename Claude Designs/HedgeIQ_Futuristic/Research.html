function genCandles(n, base, rng) {
  const out = [];
  let p = base;
  for (let i = 0; i < n; i++) {
    const open = p;
    const vol = base * 0.035;
    const close = p + (rng() - 0.5) * vol * 2;
    const high = Math.max(open, close) + rng() * vol * 0.7;
    const low = Math.min(open, close) - rng() * vol * 0.7;
    const volume = Math.floor(rng() * 80e6 + 20e6);
    out.push({ open, close, high, low, volume });
    p = close;
  }
  return out;
}

          <g key={i}>
            <line x1={x} x2={x} y1={yFor(c.high)} y2={yFor(c.low)} stroke={color} strokeWidth={1}/>
            <rect x={x - cw * 0.35} y={yFor(Math.max(c.open, c.close))} width={cw * 0.7} height={Math.max(1, Math.abs(yFor(c.open) - yFor(c.close)))} fill={color}/>
          </g>
        );
      })}
      {/* Watermark */}
      <text x={width / 2} y={priceH / 2 + 20} fontSize="40" fill="var(--border)" fontFamily="Inter Tight" fontWeight="700" textAnchor="middle" opacity="0.25" letterSpacing="6">{SYMBOL}</text>
      <text x={width / 2} y={priceH / 2 + 50} fontSize="10" fill="var(--border)" fontFamily="Inter Tight" textAnchor="middle" opacity="0.35">{t.name.toUpperCase()}</text>

      {showVolume && (
        <g transform={`translate(0, ${priceH + 10})`}>
          <text x={12} y={12} fontSize="10" fill="var(--text-subtle)" fontFamily="Inter Tight">volume {fmtCompact(last.volume).replace('$', '')}</text>
          {candles.map((c, i) => {
            const x = 10 + i * cw + cw / 2;
            const h = (c.volume / maxV) * (volH - 20);
            const up = c.close >= c.open;
            return <rect key={i} x={x - cw * 0.35} y={volH - h} width={cw * 0.7} height={h} fill={up ? 'var(--pos)' : 'var(--neg)'} opacity="0.7"/>;
          })}
        </g>
      )}
    </svg>
  );
};

// Area chart for price performance history
const MicroChart = ({ data, height = 40, width = 110, up }) => {
  const min = Math.min(...data), max = Math.max(...data);
  const r = max - min || 1;
  const pts = data.map((v, i) => `${(i/(data.length-1))*width},${height - ((v-min)/r)*height}`).join(' L');
  const color = up ? 'var(--pos)' : 'var(--neg)';
  return (
    <svg viewBox={`0 0 ${width} ${height}`} width={width} height={height}>
      <path d={'M' + pts} fill="none" stroke={color} strokeWidth="1.5"/>
    </svg>
  );
};

            </div>
          );
        })()}

                  <tr><td style={{ padding: 4 }}>EBITD margin (TTM)</td><td className="mono" style={{ textAlign: 'right' }}>10.65%</td><td className="mono" style={{ textAlign: 'right' }}>20.03%</td><td style={{ textAlign: 'right', fontSize: 10 }}>━━●━ 50th</td></tr>

              <div style={{ fontWeight: 700, fontSize: 12, marginTop: 12, color: 'var(--text-muted)' }}>Returns</div>

            <div className="card">
              <h3>Ownership & insiders <span className="more-link">More ↗</span></h3>

              <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                <svg viewBox="0 0 120 120" width={120} height={120}>
                  {(() => {
                    const segs = [
                      { v: t.ownership.inst, c: 'var(--accent-2)', label: 'Institutional' },
                      { v: t.ownership.instFund, c: 'var(--accent)', label: 'Inst. fund' },
                      { v: t.ownership.fund, c: '#d4a93a', label: 'Fund' },
                      { v: t.ownership.insider, c: 'var(--pos)', label: 'Insider' },
                      { v: t.ownership.other, c: 'var(--text-subtle)', label: 'Other' },
                    ];
                    const total = segs.reduce((s, x) => s + x.v, 0);
                    let cum = 0;
                    return segs.map((s, i) => {
                      const start = (cum / total) * 2 * Math.PI - Math.PI / 2;
                      cum += s.v;
                      const end = (cum / total) * 2 * Math.PI - Math.PI / 2;
                      const x1 = 60 + 50 * Math.cos(start);
                      const y1 = 60 + 50 * Math.sin(start);
                      const x2 = 60 + 50 * Math.cos(end);
                      const y2 = 60 + 50 * Math.sin(end);
                      const la = (end - start) > Math.PI ? 1 : 0;
                      return <path key={i} d={`M60,60 L${x1},${y1} A50,50 0 ${la} 1 ${x2},${y2} Z`} fill={s.c}/>;
                    });
                  })()}

                  <tr><td style={{ padding: 6, color: 'var(--accent)' }}>Form 8-K*</td><td>Current Report*</td><td style={{ padding: 6 }} className="mono">Apr-07-2026</td></tr>

              <div style={{ display: 'grid', gridTemplateColumns: 'auto auto', gap: '6px 10px', fontSize: 11, marginBottom: 14 }}>

                <div>Net sales</div><div className="mono" style={{ textAlign: 'right' }}>{t.income.ns.toLocaleString()}</div>
                <div>Gross profit</div><div className="mono" style={{ textAlign: 'right' }}>{t.income.gp.toLocaleString()}</div>

                <div>Operating</div><div className="mono" style={{ textAlign: 'right' }}>{t.cf.op.toLocaleString()}</div>

            <div className="card">

              <table style={{ width: '100%', fontSize: 11 }}>
                <thead>
                  <tr style={{ borderBottom: '1px solid var(--border)' }}>
                    <th style={{ textAlign: 'left', padding: 4, color: 'var(--text-muted)' }}>As of Apr-17-2026</th>
                    <th style={{ textAlign: 'right', padding: 4 }}>{SYMBOL}</th>
                    <th style={{ textAlign: 'right', padding: 4 }}>Industry Average</th>
                  </tr>
                </thead>
                <tbody>
                  <tr><td style={{ padding: 4 }}>Industry</td><td style={{ textAlign: 'right', color: 'var(--accent)' }}>{t.industry} ↗</td><td style={{ textAlign: 'right', color: 'var(--accent)' }}>{t.industry} ↗</td></tr>
                  <tr><td style={{ padding: 4, color: 'var(--accent)' }}>Equity Summary Score</td><td style={{ textAlign: 'right' }}><span className={'ess-box ' + (t.essDir === 'pos' ? 'bull' : t.essDir === 'neutral' ? 'neutral' : '')}>{t.ess.toFixed(1)}</span></td><td></td></tr>
                  <tr><td style={{ padding: 4, color: 'var(--accent)' }}>Price performance (52 Weeks)</td><td className="mono" style={{ textAlign: 'right' }}>+7.31%</td><td className="mono" style={{ textAlign: 'right' }}>+233.65%</td></tr>
                  <tr><td style={{ padding: 4, color: 'var(--accent)' }}>P/E (This year's estimate)</td><td className="mono" style={{ textAlign: 'right' }}>15.84</td><td className="mono" style={{ textAlign: 'right' }}>—</td></tr>
                  <tr><td style={{ padding: 4, color: 'var(--accent)' }}>Beta</td><td className="mono" style={{ textAlign: 'right' }}>{t.beta.toFixed(2)}</td><td className="mono" style={{ textAlign: 'right' }}>0.93</td></tr>
                  <tr><td style={{ padding: 4, color: 'var(--accent)' }}>Shares outstanding</td><td className="mono" style={{ textAlign: 'right' }}>—</td><td className="mono" style={{ textAlign: 'right' }}>344,954</td></tr>
                </tbody>
              </table>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 10 }}>Currently, {SYMBOL} does not have a full list of top competitors.</div>

              <div style={{ marginTop: 16, borderTop: '1px solid var(--border)', paddingTop: 10 }}>
                <h3 style={{ fontSize: 13, fontWeight: 700, marginBottom: 6 }}>Other ways to invest in {SYMBOL} <span style={{ fontSize: 11, color: 'var(--text-subtle)', fontWeight: 400 }}>ⓘ</span></h3>
                <table style={{ width: '100%', fontSize: 11 }}>
                  <thead>
                    <tr style={{ borderBottom: '1px solid var(--border)', color: 'var(--text-muted)' }}>
                      <th style={{ textAlign: 'left', padding: 4 }}>Symbol</th>
                      <th style={{ textAlign: 'left', padding: 4 }}>Fund Name</th>
                      <th style={{ textAlign: 'left', padding: 4 }}>Exposure % to {SYMBOL}</th>
                    </tr>
                  </thead>

                    <tr><td style={{ padding: 4, color: 'var(--accent)' }}>AINT</td><td style={{ padding: 4 }}>FINQ DOLLAR NEUTRAL U.S. Large Cap AI-Managed Equity ETF</td><td style={{ padding: 4 }}>9.06% <div style={{ display: 'inline-block', width: 80, height: 8, background: 'var(--accent-2)', marginLeft: 4, verticalAlign: 'middle' }}/></td></tr>
                  </tbody>
                </table>
                <div style={{ fontSize: 10, color: 'var(--text-subtle)', marginTop: 6 }}>Leverage and inverse ETFs are not included in the top 10 matches</div>
              </div>
            </div>
          </div>
        )}

        {tab === 'viewall' && (
          <div className="card">
            <h3>All research</h3>
            <div style={{ color: 'var(--text-muted)', fontSize: 13 }}>Click any tab above to see that section in full — Overview, Chart+, Dividends & Earnings, Sentiment, Analyst Ratings, Comparisons, and Statistics.</div>

      <div className="feedback-fab">Feedback</div>

  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
