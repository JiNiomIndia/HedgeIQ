name: HedgeIQ Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # Backend test environment — NEVER use these values in production.
  DATABASE_URL: sqlite:///./test_hedgeiq.db
  SECRET_KEY: ci-test-secret-key-minimum-32-chars-xyz
  ANTHROPIC_API_KEY: test-anthropic-key
  POLYGON_API_KEY: test-polygon-key
  SNAPTRADE_CLIENT_ID: test-client
  SNAPTRADE_CONSUMER_KEY: test-key
  SNAPTRADE_PERSONAL_USER_ID: test-user
  SNAPTRADE_USER_SECRET: "00000000-0000-0000-0000-000000000000"
  ADMIN_EMAIL: admin@test.hedgeiq.com
  ADMIN_PASSWORD: NOT-A-REAL-PASSWORD-test-only
  ENVIRONMENT: test
  CHROMADB_PATH: ./data/test_chroma_cache

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Backend unit + integration tests
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend Tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data/test_chroma_cache

      - name: Lint (ruff)
        run: pip install ruff && ruff check backend/ --select=E,F,W --ignore=E501
        continue-on-error: false

      - name: Type check (mypy)
        run: pip install mypy && mypy backend/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Run unit tests
        run: |
          pytest backend/tests/unit/ -v -q \
            --asyncio-mode=auto \
            --tb=short \
            -x

      - name: Run integration tests
        run: |
          pytest backend/tests/integration/ -v \
            --asyncio-mode=auto \
            --tb=short \
            -x

      - name: Run all tests with coverage
        run: |
          pytest backend/tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            --asyncio-mode=auto \
            -q \
            --ignore=backend/tests/performance
        continue-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Performance baseline (separate job — slower, optional on PRs)
  # ─────────────────────────────────────────────────────────────────────────
  backend-performance:
    name: Backend Performance Baselines
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'  # Only on main branch

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: mkdir -p data/test_chroma_cache
      - name: Run performance tests
        run: |
          pytest backend/tests/performance/ -v \
            --asyncio-mode=auto \
            --tb=short

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend unit / component tests (Vitest)
  # ─────────────────────────────────────────────────────────────────────────
  frontend-unit:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Lint (eslint)
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        run: npm test

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Check bundle size
        run: |
          npm run build
          TOTAL=$(find dist/assets -name "*.js" | xargs gzip -c | wc -c)
          echo "Total JS gzip size: $TOTAL bytes"
          [ "$TOTAL" -lt 1048576 ] || (echo "Bundle too large: $TOTAL bytes (limit: 1MB gzipped)" && exit 1)

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: frontend/coverage
          flags: frontend
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # E2E tests (Playwright + live stack)
  # ─────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Create data directories
        run: mkdir -p data/test_chroma_cache

      - name: Start backend server
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend..."
          timeout 30 bash -c 'until curl -sf http://localhost:8000/health; do echo "  still waiting..."; sleep 1; done' \
            || (echo "ERROR: Backend failed to start within 30 seconds" && exit 1)
        env:
          DATABASE_URL: sqlite:///./test_hedgeiq.db
          SECRET_KEY: ci-test-secret-key-minimum-32-chars-xyz
          ANTHROPIC_API_KEY: test-anthropic-key
          POLYGON_API_KEY: test-polygon-key
          SNAPTRADE_CLIENT_ID: test-client
          SNAPTRADE_CONSUMER_KEY: test-key
          SNAPTRADE_PERSONAL_USER_ID: test-user
          SNAPTRADE_USER_SECRET: "00000000-0000-0000-0000-000000000000"
          ADMIN_EMAIL: admin@test.hedgeiq.com
          ADMIN_PASSWORD: NOT-A-REAL-PASSWORD-test-only
          ENVIRONMENT: test
          CHROMADB_PATH: ./data/test_chroma_cache

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ github.run_number }}
          path: frontend/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Accessibility scan (axe-core via Playwright)
  # ─────────────────────────────────────────────────────────────────────────
  accessibility:
    name: Accessibility Scan (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: pip install -r requirements.txt
      - name: Install Node dependencies + axe
        working-directory: frontend
        run: |
          npm ci
          npm install --save-dev @axe-core/playwright || true
          npx playwright install chromium --with-deps
      - run: mkdir -p data/test_chroma_cache
      - name: Start backend
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          timeout 30 bash -c 'until curl -sf http://localhost:8000/health; do sleep 1; done'
        env:
          DATABASE_URL: sqlite:///./test_hedgeiq.db
          SECRET_KEY: ci-test-secret-key-minimum-32-chars-xyz
          ANTHROPIC_API_KEY: test-key
          POLYGON_API_KEY: test-key
          SNAPTRADE_CLIENT_ID: test-client
          SNAPTRADE_CONSUMER_KEY: test-key
          ADMIN_EMAIL: admin@test.hedgeiq.com
          ADMIN_PASSWORD: NOT-A-REAL-PASSWORD-test-only
          ENVIRONMENT: test
          CHROMADB_PATH: ./data/test_chroma_cache
      - name: Run accessibility tests
        working-directory: frontend
        run: npx playwright test e2e/accessibility.spec.ts --reporter=list
        env:
          CI: true
      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: accessibility-report-${{ github.run_number }}
          path: frontend/playwright-report/
          retention-days: 7
