// Generate mock option data
function genOptions(strike, atmPrice, baseIV) {
  const moneyness = (atmPrice - strike) / atmPrice;
  const callITM = strike < atmPrice;
  const putITM = strike > atmPrice;
  const callLast = Math.max(0.05, atmPrice - strike + Math.random() * 0.5 + Math.abs(moneyness) * 0.8);
  const putLast = Math.max(0.05, strike - atmPrice + Math.random() * 0.5 + Math.abs(moneyness) * 0.8);
  const callIV = baseIV + (1 - Math.abs(moneyness)) * 20 + Math.random() * 5;
  const putIV = baseIV + (1 - Math.abs(moneyness)) * 20 + Math.random() * 5;
  const callDelta = Math.max(0.01, Math.min(0.99, 0.5 + moneyness * 2));
  const putDelta = -Math.max(0.01, Math.min(0.99, 0.5 - moneyness * 2));
  return {
    call: {
      last: callLast.toFixed(2),
      change: 0.00,
      bid: (callLast - 0.1).toFixed(2),
      ask: (callLast + 0.05).toFixed(2),
      volume: callITM ? Math.floor(Math.random() * 100) : Math.floor(Math.random() * 200),
      openInterest: Math.floor(Math.random() * 1500),
      iv: callIV.toFixed(2),
      delta: callDelta.toFixed(4),
    },
    put: {
      last: putLast.toFixed(2),
      change: 0.00,
      bid: (putLast - 0.1).toFixed(2),
      ask: (putLast + 0.05).toFixed(2),
      volume: putITM ? Math.floor(Math.random() * 100) : Math.floor(Math.random() * 300),
      openInterest: Math.floor(Math.random() * 4000),
      iv: putIV.toFixed(2),
      delta: putDelta.toFixed(4),
    },
  };
}

// Custom dropdown component
const Dropdown = ({ value, options, onChange, width }) => {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef();
  React.useEffect(() => {
    const onDown = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, []);
  return (
    <div ref={ref} className="oc-dropdown-wrap">
      <button className="oc-select" style={{ width: width || 160, textAlign: 'left' }} onClick={() => setOpen(o => !o)}>
        {value}
      </button>
      {open && (
        <div className="oc-dropdown" style={{ minWidth: width || 160 }}>
          {options.map(o => (
            <div key={o} className={'oc-dropdown-item' + (o === value ? ' active' : '')} onClick={() => { onChange(o); setOpen(false); }}>
              {o}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// Strike-prices dropdown: list of counts + custom range UI
const StrikeDropdown = ({ value, onChange, range, setRange, onApplyRange }) => {
  const [open, setOpen] = React.useState(false);
  const [fromVal, setFromVal] = React.useState(range.from || '');
  const [toVal, setToVal] = React.useState(range.to || '');
  const ref = React.useRef();
  React.useEffect(() => {
    const onDown = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, []);
  const apply = () => {
    onApplyRange(parseFloat(fromVal), parseFloat(toVal));
    setOpen(false);
  };
  return (
    <div ref={ref} className="oc-dropdown-wrap">
      <button className="oc-select" style={{ width: 110, textAlign: 'left' }} onClick={() => setOpen(o => !o)}>
        {range.from != null ? `${range.from}–${range.to}` : value}
      </button>
      {open && (
        <div className="oc-dropdown" style={{ minWidth: 260, padding: 0 }}>
          {STRIKE_COUNTS.map(c => (
            <div key={c} className={'oc-dropdown-item' + (c === value && range.from == null ? ' active' : '')} onClick={() => { onChange(c); setRange({ from: null, to: null }); setOpen(false); }}>
              {c}
            </div>
          ))}
          <div className="custom-range" style={{ margin: 10, marginTop: 4 }}>
            <div className="custom-range-title">Custom strike prices range</div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end' }}>
              <div>
                <div style={{ fontSize: 10, color: 'var(--text-subtle)', marginBottom: 2 }}>From</div>
                <input type="number" value={fromVal} onChange={e => setFromVal(e.target.value)} placeholder=""/>
              </div>
              <div>
                <div style={{ fontSize: 10, color: 'var(--text-subtle)', marginBottom: 2 }}>To</div>
                <input type="number" value={toVal} onChange={e => setToVal(e.target.value)} placeholder=""/>
              </div>
              <button className="apply-btn" onClick={apply}>Apply</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

          </div>
          <span className="label" style={{ marginTop: 6 }}>52-week range</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <span className="mono" style={{ fontSize: 11 }}>{t.low52.toFixed(3)}</span>
            <div style={{ width: 80, height: 2, background: 'var(--border)', position: 'relative' }}>
              <div style={{ position: 'absolute', top: -3, left: '55%', width: 8, height: 8, borderRadius: 999, background: 'var(--accent)' }}/>
            </div>
            <span className="mono" style={{ fontSize: 11 }}>{t.high52.toFixed(2)}</span>
          </div>
          <div style={{ fontSize: 10, color: 'var(--text-subtle)' }}>04/21/2025  04/08/2026</div>
        </div>

        <div className="oc-quote-field">
          <span className="label"><span style={{ background: 'var(--accent)', color: 'white', padding: '1px 4px', borderRadius: 2, fontSize: 9 }}>D</span> Ex-dividend</span>
          <span className="value">{t.exDiv}</span>
          <span className="label" style={{ marginTop: 6 }}><span style={{ background: 'var(--pos)', color: 'white', padding: '1px 4px', borderRadius: 2, fontSize: 9 }}>E</span> Earnings</span>
          <span className="value" style={{ color: 'var(--pos)' }}>{t.earnings}</span>
        </div>

        <div className="oc-quote-field">
          <span className="label">IV30</span>
          <div style={{ display: 'flex', gap: 6 }}>
            <span className="value mono">{t.iv30.toFixed(2)}</span>
            <span className="mono" style={{ fontSize: 11, color: 'var(--neg)' }}>{t.ivChg.toFixed(2)}</span>
          </div>
          <span className="label" style={{ marginTop: 6 }}>HV30</span>
          <div style={{ display: 'flex', gap: 6 }}>
            <span className="value mono">{t.hv30.toFixed(2)}</span>
            <span className="mono" style={{ fontSize: 11, color: 'var(--neg)' }}>{t.hvChg.toFixed(2)}</span>
          </div>
        </div>

        <div className="oc-quote-field">
          <span className="label">Put/call ratio</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ width: 10, height: 10, borderRadius: 999, background: 'var(--pos)' }}></span>
            <span className="value mono">{t.putCall.toFixed(2)}</span>
            <span style={{ color: 'var(--pos)', fontSize: 11 }}>({t.sentiment})</span>
          </div>
        </div>
      </div>

      {/* Chain / Chart tabs */}
      <div className="oc-tabs">
        <div className={'oc-tab' + (tab === 'chain' ? ' active' : '')} onClick={() => setTab('chain')}>Chain</div>
        <div className={'oc-tab' + (tab === 'chart' ? ' active' : '')} onClick={() => setTab('chart')}>Chart</div>
      </div>

      {/* Filters row */}
      <div className="oc-filters">
        <div className="oc-filter-group">
          <span className="filter-label">Option strategy</span>
          <Dropdown value={strategy} options={STRATEGIES} onChange={setStrategy} width={160}/>
        </div>

        <div className="oc-filter-group">
          <span className="filter-label">Option classes</span>
          <div className="oc-seg">
            <button className={optionClass === 'Calls' ? 'active' : ''} onClick={() => setOptionClass('Calls')}>Calls</button>
            <button className={optionClass === 'Puts' ? 'active' : ''} onClick={() => setOptionClass('Puts')}>Puts</button>
            <button className={optionClass === 'Both' ? 'active' : ''} onClick={() => setOptionClass('Both')}>Both</button>
          </div>
        </div>

        <div className="oc-filter-group">
          <span className="filter-label">Strike prices</span>
          <StrikeDropdown
            value={strikeCount}
            onChange={setStrikeCount}
            range={strikeRange}
            setRange={setStrikeRange}
            onApplyRange={(from, to) => { if (!isNaN(from) && !isNaN(to)) setStrikeRange({ from, to }); }}
          />
        </div>

        <div className="oc-filter-group" style={{ flexGrow: 1 }}>
          <span className="filter-label">Expiration dates</span>
          <div style={{ height: 30, display: 'flex', alignItems: 'center' }}>
            <button onClick={() => setShowExpirations(s => !s)} style={{ fontSize: 12, color: 'var(--accent)', cursor: 'pointer', background: 'transparent', border: 0, padding: 0, fontWeight: 500 }}>
              {showExpirations ? 'Collapse expirations ▴' : 'Show expirations ▾'}
            </button>
          </div>
        </div>

        <div className="oc-filter-group">
          <span className="filter-label">&nbsp;</span>
          <label className="oc-switch">
            <span>Show weekly options</span>
            <span className={'oc-switch-track' + (weeklies ? '' : ' off')} onClick={() => setWeeklies(w => !w)}>
              <span className="oc-switch-thumb"/>
            </span>
          </label>
        </div>
      </div>

      {/* Expiration date pills */}
      {showExpirations && (
        <div className="oc-expiry">
          <button style={{ background: 'transparent', border: 0, cursor: 'pointer', color: 'var(--text-muted)', fontSize: 18, padding: '0 4px' }}>‹</button>
          {expirations.map((e, i) => {
            const isPast = i < activeExpiry;
            const future = i > 8;
            return (
              <div
                key={i}
                className={'exp-pill' + (future ? ' future' : '') + (e.earnings ? ' earnings' : '')}
                onClick={() => setActiveExpiry(i)}
                style={{
                  background: i === activeExpiry ? 'var(--pos)' : (future ? 'transparent' : 'color-mix(in oklch, var(--pos) 70%, var(--surface))'),
                  opacity: future ? 0.65 : 1,
                }}
                title={`${e.month} ${e.day}, ${e.year}`}
              >
                {future ? (
                  <span>{e.month} {e.day}</span>
                ) : (
                  <>
                    <span className="m">{e.month}</span>
                    <span className="d">{e.day}</span>
                    {e.weekly && <span className="w">W</span>}
                  </>
                )}
              </div>
            );
          })}
          <button style={{ background: 'transparent', border: 0, cursor: 'pointer', color: 'var(--text-muted)', fontSize: 18, padding: '0 4px' }}>›</button>
        </div>
      )}

      {tab === 'chart' && (
        <div style={{ padding: 24 }}>
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', padding: 16 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <div style={{ fontSize: 11, fontFamily: 'JetBrains Mono, monospace', color: 'var(--text-muted)' }}>
                Apr-17-2026 &nbsp; O: {(t.price-0.15).toFixed(2)} &nbsp; H: {t.dayHigh.toFixed(2)} &nbsp; L: {t.dayLow.toFixed(2)} &nbsp; C: {t.price.toFixed(2)} &nbsp; V: {(t.volume/1e6).toFixed(2)}M
              </div>
              <div style={{ display: 'inline-flex', border: '1px solid var(--border)' }}>
                {['1D','5D','1M','3M','6M','YTD','1Y','2Y','5Y','MAX'].map((r,i) => (
                  <button key={r} style={{ padding: '4px 12px', fontSize: 11, border: 0, borderRight: i < 9 ? '1px solid var(--border)' : 0, background: i === 2 ? 'var(--pos)' : 'transparent', color: i === 2 ? 'white' : 'var(--text-muted)', fontFamily: 'JetBrains Mono, monospace', cursor: 'pointer', fontWeight: i === 2 ? 700 : 500 }}>{r}</button>
                ))}
              </div>
            </div>
            <svg viewBox="0 0 1200 460" style={{ width: '100%', height: 460, display: 'block' }}>
              {[0,0.25,0.5,0.75,1].map(f => {
                const y = 20 + 320 * f;
                const v = t.price * (1.15 - 0.3 * f);
                return (<g key={f}>
                  <line x1="40" x2="1140" y1={y} y2={y} stroke="var(--border)" strokeDasharray="2 3"/>
                  <text x="1148" y={y+4} fontSize="10" fill="var(--text-subtle)" fontFamily="JetBrains Mono">{v.toFixed(2)}</text>
                </g>);
              })}
              {Array.from({length: 90}, (_, i) => {
                const rng = Math.sin(i * 17.3 + SYMBOL.charCodeAt(0)) * 0.5 + 0.5;
                const rng2 = Math.sin(i * 31.7 + SYMBOL.charCodeAt(0) * 3) * 0.5 + 0.5;
                const base = t.price * (0.85 + i / 90 * 0.3 + (rng - 0.5) * 0.08);
                const open = base + (rng - 0.5) * t.price * 0.015;
                const close = base + (rng2 - 0.5) * t.price * 0.015;
                const high = Math.max(open, close) + rng * t.price * 0.01;
                const low = Math.min(open, close) - rng2 * t.price * 0.01;
                const up = close >= open;
                const color = up ? 'var(--pos)' : 'var(--neg)';
                const x = 40 + i * 12;
                const yFor = v => 20 + 320 * (1 - (v - t.price * 0.78) / (t.price * 0.44));
                return (<g key={i}>
                  <line x1={x+5} x2={x+5} y1={yFor(high)} y2={yFor(low)} stroke={color} strokeWidth={1}/>
                  <rect x={x+1} y={yFor(Math.max(open,close))} width={8} height={Math.max(1, Math.abs(yFor(open)-yFor(close)))} fill={color}/>
                </g>);
              })}
              <text x="600" y="200" fontSize="56" fill="var(--border)" fontFamily="Inter Tight" fontWeight="700" textAnchor="middle" opacity="0.2" letterSpacing="8">{SYMBOL}</text>
              {/* Volume */}
              <g transform="translate(0, 360)">
                {Array.from({length: 90}, (_, i) => {
                  const rng = Math.sin(i * 17.3 + SYMBOL.charCodeAt(0)) * 0.5 + 0.5;
                  const rng2 = Math.sin(i * 31.7 + SYMBOL.charCodeAt(0) * 3) * 0.5 + 0.5;
                  const up = rng2 >= rng;
                  const h = rng * 60 + 8;
                  return <rect key={i} x={41 + i*12} y={70 - h} width={8} height={h} fill={up ? 'var(--pos)' : 'var(--neg)'} opacity="0.6"/>;
                })}
                <text x="48" y="14" fontSize="10" fill="var(--text-subtle)">volume</text>
              </g>
            </svg>
          </div>
        </div>
      )}

      {tab === 'chain' && (
      <div className="oc-chain">
        <div style={{ marginTop: 10, display: 'flex', alignItems: 'center', gap: 10 }}>
          <span className="strat-badge">{strategy}</span>
          {strikeRange.from != null && (
            <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>
              Custom range: <span className="mono" style={{ fontWeight: 600, color: 'var(--text)' }}>{strikeRange.from} – {strikeRange.to}</span>
              <button onClick={() => setStrikeRange({ from: null, to: null })} style={{ marginLeft: 8, color: 'var(--accent)', fontSize: 12, background: 'transparent', border: 0, cursor: 'pointer', textDecoration: 'underline' }}>Clear</button>
            </span>
          )}
        </div>

        <table className="chain-table">
          <thead>
            <tr>
              <th colSpan={8} style={{ textAlign: 'left', borderBottom: '2px solid var(--pos)', color: 'var(--pos)', fontSize: 13, fontWeight: 700, paddingLeft: 8 }}>Calls</th>
              <th style={{ background: 'var(--surface-sunken)' }}></th>
              <th colSpan={8} style={{ textAlign: 'left', borderBottom: '2px solid var(--neg)', color: 'var(--neg)', fontSize: 13, fontWeight: 700, paddingLeft: 8 }}>Puts</th>
            </tr>
            <tr>
              <th>Last</th>
              <th>Change</th>
              <th>Bid</th>
              <th>Ask</th>
              <th>Volume</th>
              <th>Open<br/>interest</th>
              <th>Implied<br/>volatility</th>
              <th>Delta</th>
              <th className="strike-col">Strike</th>
              <th>Last</th>
              <th>Change</th>
              <th>Bid</th>
              <th>Ask</th>
              <th>Volume</th>
              <th>Open<br/>interest</th>
              <th>Implied<br/>volatility</th>
              <th>Delta</th>
            </tr>
          </thead>
          <tbody>
            <tr className="expiry-row">
              <td colSpan={17}>
                ▾ {activeExp.month} {activeExp.day}, {activeExp.year} (W) · expires in {Math.floor(Math.random() * 7) + 3} days
              </td>
            </tr>
            {optionData.map((row, i) => (
              <tr key={row.strike}>
                <td>{row.call.last}</td>
                <td>{row.call.change.toFixed(2)}</td>
                <td><button className="bid-btn">Sell at {row.call.bid}</button></td>
                <td><button className="ask-btn">Buy at {row.call.ask}</button></td>
                <td>{row.call.volume}</td>
                <td>{row.call.openInterest}</td>
                <td>{row.call.iv}%</td>
                <td>{row.call.delta}</td>
                <td className="strike">{row.strike}</td>
                <td>{row.put.last}</td>
                <td>{row.put.change.toFixed(2)}</td>
                <td><button className="bid-btn">Sell at {row.put.bid}</button></td>
                <td><button className="ask-btn">Buy at {row.put.ask}</button></td>
                <td>{row.put.volume}</td>
                <td style={{ background: i === Math.floor(optionData.length / 2) ? 'rgba(255, 220, 80, 0.25)' : '' }}>{row.put.openInterest}</td>
                <td>{row.put.iv}%</td>
                <td>{row.put.delta}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      )}
      {/* close chain tab */}
      <div className="feedback-fab">Feedback</div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
