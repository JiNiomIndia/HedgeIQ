<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="HedgeIQ sign-up form">
  <style>
    .bg { fill: var(--bg, #0A0E1A); }
    .surface { fill: var(--surface, #11172A); }
    .surface-2 { fill: var(--surface-2, #161D33); }
    .text { fill: var(--text, #F8FAFC); font-family: 'Inter Tight', sans-serif; }
    .text-muted { fill: var(--text-muted, #94A3B8); font-family: 'Inter Tight', sans-serif; }
    .text-subtle { fill: var(--text-subtle, #64748B); font-family: 'Inter Tight', sans-serif; }
    .accent { fill: var(--accent, #8B5CF6); }
  </style>
  <rect class="bg" width="800" height="600"/>

  <rect class="surface" x="200" y="80" width="400" height="440" rx="12"/>

  <rect class="accent" x="368" y="120" width="64" height="64" rx="14"/>
  <text x="400" y="160" text-anchor="middle" fill="#fff" font-size="28" font-weight="700">H</text>

  <text class="text" x="400" y="220" text-anchor="middle" font-size="22" font-weight="700">Welcome to HedgeIQ</text>
  <text class="text-muted" x="400" y="244" text-anchor="middle" font-size="13">Create your free account in seconds</text>

  <text class="text-subtle" x="232" y="288" font-size="11" font-weight="600">EMAIL</text>
  <rect class="surface-2" x="232" y="296" width="336" height="40" rx="8"/>
  <text class="text-subtle" x="248" y="320" font-size="13">you@example.com</text>

  <text class="text-subtle" x="232" y="360" font-size="11" font-weight="600">PASSWORD · 8+ characters</text>
  <rect class="surface-2" x="232" y="368" width="336" height="40" rx="8"/>
  <text class="text-subtle" x="248" y="392" font-size="13">••••••••••</text>

  <rect class="accent" x="232" y="428" width="336" height="44" rx="8"/>
  <text x="400" y="456" text-anchor="middle" fill="#fff" font-weight="700" font-size="14">Create account</text>

  <text class="text-muted" x="400" y="496" text-anchor="middle" font-size="12">Already have an account?</text>
  <text class="accent" x="400" y="496" text-anchor="middle" font-size="12" font-weight="600" dx="120">Sign in</text>
</svg>
