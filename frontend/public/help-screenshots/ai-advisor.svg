<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" role="img" aria-label="AI advisor chat panel">
  <style>
    .bg { fill: var(--bg, #0A0E1A); }
    .surface { fill: var(--surface, #11172A); }
    .surface-2 { fill: var(--surface-2, #161D33); }
    .text { fill: var(--text, #F8FAFC); font-family: 'Inter Tight', sans-serif; }
    .text-muted { fill: var(--text-muted, #94A3B8); font-family: 'Inter Tight', sans-serif; }
    .text-subtle { fill: var(--text-subtle, #64748B); font-family: 'Inter Tight', sans-serif; }
    .accent { fill: var(--accent, #8B5CF6); }
  </style>
  <rect class="bg" width="600" height="720"/>
  <rect class="surface" x="20" y="20" width="560" height="680" rx="10"/>

  <text class="text" x="44" y="56" font-size="18" font-weight="700">AI Advisor</text>
  <text class="text-subtle" x="44" y="78" font-size="12">5 calls remaining today · Powered by Claude</text>
  <rect class="surface-2" x="500" y="40" width="56" height="24" rx="4"/>
  <text class="text-muted" x="528" y="56" text-anchor="middle" font-size="11">Clear</text>

  <!-- User msg -->
  <rect class="surface-2" x="44" y="108" width="320" height="56" rx="10"/>
  <text class="text-subtle" x="56" y="128" font-size="10" font-weight="600">YOU</text>
  <text class="text" x="56" y="148" font-size="13">Why is the $10 strike a better deal</text>
  <text class="text" x="56" y="164" font-size="13">than the $10.50 for AAL?</text>

  <!-- Claude reply -->
  <rect class="surface-2" x="220" y="184" width="336" height="240" rx="10"/>
  <text class="accent" x="232" y="204" font-size="10" font-weight="600">CLAUDE</text>
  <text class="text" x="232" y="224" font-size="13">Both are protective puts with the</text>
  <text class="text" x="232" y="240" font-size="13">same 45-day expiration, so the</text>
  <text class="text" x="232" y="256" font-size="13">relevant differences are coverage</text>
  <text class="text" x="232" y="272" font-size="13">and cost.</text>
  <text class="text" x="232" y="296" font-size="13">$10 strike: covers an 8.8% drop,</text>
  <text class="text" x="232" y="312" font-size="13">costs $1,250 total (~0.5% of</text>
  <text class="text" x="232" y="328" font-size="13">position). $10.50 strike: covers</text>
  <text class="text" x="232" y="344" font-size="13">a 4.3% drop, costs $2,100 (~0.9%).</text>
  <text class="text" x="232" y="368" font-size="13">The $10 is roughly half the</text>
  <text class="text" x="232" y="384" font-size="13">premium for protection that kicks</text>
  <text class="text" x="232" y="400" font-size="13">in a bit deeper. If you mostly</text>
  <text class="text" x="232" y="416" font-size="13">care about a tail-risk scenario,</text>
  <text class="text accent" x="232" y="432" font-size="13" font-weight="600">$10 wins on cost-efficiency...▍</text>

  <!-- Quick replies -->
  <text class="text-subtle" x="44" y="468" font-size="11" font-weight="600">QUICK QUESTIONS</text>
  <rect class="surface-2" x="44" y="480" width="170" height="34" rx="17"/>
  <text class="text-muted" x="129" y="502" text-anchor="middle" font-size="12">What is IV?</text>

  <rect class="surface-2" x="226" y="480" width="170" height="34" rx="17"/>
  <text class="text-muted" x="311" y="502" text-anchor="middle" font-size="12">Hedge before earnings?</text>

  <rect class="surface-2" x="408" y="480" width="148" height="34" rx="17"/>
  <text class="text-muted" x="482" y="502" text-anchor="middle" font-size="12">Explain delta</text>

  <!-- Input -->
  <rect class="surface-2" x="44" y="640" width="512" height="40" rx="10"/>
  <text class="text-subtle" x="60" y="664" font-size="13">Ask anything about your portfolio...</text>
  <rect class="accent" x="516" y="648" width="32" height="24" rx="6"/>
  <text x="532" y="664" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">→</text>
</svg>
