<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-label="Broker selection grid">
  <style>
    .bg { fill: var(--bg, #0A0E1A); }
    .surface { fill: var(--surface, #11172A); }
    .surface-2 { fill: var(--surface-2, #161D33); }
    .text { fill: var(--text, #F8FAFC); font-family: 'Inter Tight', sans-serif; }
    .text-muted { fill: var(--text-muted, #94A3B8); font-family: 'Inter Tight', sans-serif; }
    .text-subtle { fill: var(--text-subtle, #64748B); font-family: 'Inter Tight', sans-serif; }
    .accent { fill: var(--accent, #8B5CF6); }
    .pill { stroke: var(--border, #1E2742); }
  </style>
  <rect class="bg" width="900" height="640"/>
  <rect class="surface" x="40" y="40" width="820" height="560" rx="12"/>

  <text class="text" x="68" y="84" font-size="22" font-weight="700">Connect a broker</text>
  <text class="text-muted" x="68" y="108" font-size="13">Choose your brokerage. We use SnapTrade for secure, read-only access.</text>

  <!-- Filter chips -->
  <rect class="accent" x="68" y="136" width="64" height="28" rx="14"/>
  <text x="100" y="155" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">All</text>
  <rect class="surface-2" x="140" y="136" width="56" height="28" rx="14"/>
  <text class="text-muted" x="168" y="155" text-anchor="middle" font-size="12">US</text>
  <rect class="surface-2" x="204" y="136" width="60" height="28" rx="14"/>
  <text class="text-muted" x="234" y="155" text-anchor="middle" font-size="12">EU</text>
  <rect class="surface-2" x="272" y="136" width="80" height="28" rx="14"/>
  <text class="text-muted" x="312" y="155" text-anchor="middle" font-size="12">Crypto</text>

  <!-- Broker tiles -->
  <g>
    <!-- Row 1 -->
    <rect class="surface-2" x="68" y="184" width="180" height="80" rx="10"/>
    <circle cx="98" cy="224" r="14" fill="#65E45C"/>
    <text class="text" x="124" y="220" font-size="14" font-weight="600">Robinhood</text>
    <text class="text-subtle" x="124" y="240" font-size="11">Stocks · Options · Crypto</text>

    <rect class="surface-2" x="260" y="184" width="180" height="80" rx="10"/>
    <circle cx="290" cy="224" r="14" fill="#5BAE3D"/>
    <text class="text" x="316" y="220" font-size="14" font-weight="600">Fidelity</text>
    <text class="text-subtle" x="316" y="240" font-size="11">Stocks · Options</text>

    <rect class="surface-2" x="452" y="184" width="180" height="80" rx="10"/>
    <circle cx="482" cy="224" r="14" fill="#0F6CB1"/>
    <text class="text" x="508" y="220" font-size="14" font-weight="600">Schwab</text>
    <text class="text-subtle" x="508" y="240" font-size="11">Stocks · Options</text>

    <rect class="surface-2" x="644" y="184" width="180" height="80" rx="10"/>
    <circle cx="674" cy="224" r="14" fill="#D81E27"/>
    <text class="text" x="700" y="220" font-size="14" font-weight="600">E*TRADE</text>
    <text class="text-subtle" x="700" y="240" font-size="11">Stocks · Options</text>

    <!-- Row 2 -->
    <rect class="surface-2" x="68" y="280" width="180" height="80" rx="10"/>
    <circle cx="98" cy="320" r="14" fill="#1E3A8A"/>
    <text class="text" x="124" y="316" font-size="14" font-weight="600">IBKR</text>
    <text class="text-subtle" x="124" y="336" font-size="11">Stocks · Options · Crypto</text>

    <rect class="surface-2" x="260" y="280" width="180" height="80" rx="10"/>
    <circle cx="290" cy="320" r="14" fill="#FFCA1F"/>
    <text class="text" x="316" y="316" font-size="14" font-weight="600">TastyTrade</text>
    <text class="text-subtle" x="316" y="336" font-size="11">Stocks · Options</text>

    <rect class="surface-2" x="452" y="280" width="180" height="80" rx="10"/>
    <circle cx="482" cy="320" r="14" fill="#1ABCFE"/>
    <text class="text" x="508" y="316" font-size="14" font-weight="600">Webull</text>
    <text class="text-subtle" x="508" y="336" font-size="11">Stocks · Options · Crypto</text>

    <rect class="surface-2" x="644" y="280" width="180" height="80" rx="10"/>
    <circle cx="674" cy="320" r="14" fill="#000"/>
    <text class="text" x="700" y="316" font-size="14" font-weight="600">Public</text>
    <text class="text-subtle" x="700" y="336" font-size="11">Stocks · Options · Crypto</text>

    <!-- Row 3 -->
    <rect class="surface-2" x="68" y="376" width="180" height="80" rx="10"/>
    <circle cx="98" cy="416" r="14" fill="#0052FF"/>
    <text class="text" x="124" y="412" font-size="14" font-weight="600">Coinbase</text>
    <text class="text-subtle" x="124" y="432" font-size="11">Crypto</text>

    <rect class="surface-2" x="260" y="376" width="180" height="80" rx="10"/>
    <circle cx="290" cy="416" r="14" fill="#5741D9"/>
    <text class="text" x="316" y="412" font-size="14" font-weight="600">Kraken</text>
    <text class="text-subtle" x="316" y="432" font-size="11">Crypto</text>

    <rect class="surface-2" x="452" y="376" width="180" height="80" rx="10"/>
    <circle cx="482" cy="416" r="14" fill="#0036A5"/>
    <text class="text" x="508" y="412" font-size="14" font-weight="600">Wealthsimple</text>
    <text class="text-subtle" x="508" y="432" font-size="11">CA · Stocks · Crypto</text>

    <rect class="surface-2" x="644" y="376" width="180" height="80" rx="10"/>
    <circle cx="674" cy="416" r="14" fill="#16A34A"/>
    <text class="text" x="700" y="412" font-size="14" font-weight="600">Trading 212</text>
    <text class="text-subtle" x="700" y="432" font-size="11">UK · EU · Stocks</text>
  </g>

  <text class="text-muted" x="68" y="510" font-size="13">+ 18 more brokers across the US, Canada, UK, Australia, and crypto exchanges</text>
  <rect class="surface-2" x="68" y="528" width="220" height="40" rx="8"/>
  <text class="accent" x="178" y="552" text-anchor="middle" font-size="13" font-weight="600">View all supported brokers →</text>
</svg>
