  <polyline points="56,560 160,540 260,510 360,490 460,470 560,440 660,420 760,400 860,380 940,360" stroke="url(#accent)" stroke-width="2.5" fill="none"/>
  <polyline points="56,560 160,540 260,510 360,490 460,470 560,440 660,420 760,400 860,380 940,360 940,600 56,600" fill="rgba(184,84,42,0.08)" stroke="none"/>
