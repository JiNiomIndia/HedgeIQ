    <text x="1020" y="380" fill="#141B2D" font-weight="600">AAL</text><text x="1540" y="380" fill="#C8352A" text-anchor="end">-2.8%</text>
    <text x="1020" y="414" fill="#141B2D" font-weight="600">SPY</text><text x="1540" y="414" fill="#0E8F4A" text-anchor="end">+0.6%</text>
    <text x="1020" y="448" fill="#141B2D" font-weight="600">TSLA</text><text x="1540" y="448" fill="#C8352A" text-anchor="end">-0.9%</text>
    <text x="1020" y="482" fill="#141B2D" font-weight="600">MSFT</text><text x="1540" y="482" fill="#0E8F4A" text-anchor="end">+1.0%</text>
