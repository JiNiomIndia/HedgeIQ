  <rect x="32" y="748" width="1536" height="220" rx="6" fill="#FFFFFF" stroke="#E2DCD0"/>
  <text x="56" y="780" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#141B2D">Recent activity</text>
  <g font-family="Inter, sans-serif" font-size="12" fill="#5A6075">
    <text x="56" y="820">10:41  AAPL · 50 shares · $172.40</text>
    <text x="56" y="852">10:32  NVDA Put 850 · sell 5</text>
    <text x="56" y="884">10:18  Hedge calc · AAL · top result Put 11</text>
    <text x="56" y="916">09:55  Daily AI brief generated</text>
