    <text x="56" y="198" font-size="13" fill="#0E8F4A">+$3,212 (1.14%) today</text>

    <rect x="416" y="96" width="370" height="120" rx="6" fill="#FFFFFF" stroke="#E2DCD0"/>
    <text x="440" y="128" font-size="12" fill="#6E7384" letter-spacing="1">DAY P/L</text>
    <text x="440" y="172" font-size="34" font-weight="700" fill="#0E8F4A">+$3,212.00</text>
    <text x="440" y="198" font-size="13" fill="#6E7384">across 14 positions</text>

    <rect x="800" y="96" width="370" height="120" rx="6" fill="#FFFFFF" stroke="#E2DCD0"/>
