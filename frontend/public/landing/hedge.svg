    <text x="614" y="247" font-size="12" fill="#FFF" font-weight="600" text-anchor="middle">BEST</text>
    <text x="660" y="248" font-size="12" fill="#5A6075">value/$ 4.71 · breakeven $10.62 · max protected $56,500</text>
