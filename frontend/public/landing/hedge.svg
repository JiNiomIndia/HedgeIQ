  <g>
    <rect x="556" y="148" width="1012" height="240" rx="8" fill="#FFFFFF" stroke="#B8542A" stroke-width="1.5"/>
    <text x="580" y="184" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#141B2D">AAL Put · $11 · Nov 8</text>
    <text x="580" y="212" font-family="Inter, sans-serif" font-size="13" fill="#5A6075">Bid $0.36 · Ask $0.38 · IV 42.1% · Volume 2,140</text>
