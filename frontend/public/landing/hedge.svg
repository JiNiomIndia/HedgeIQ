  <text x="580" y="800" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#141B2D">AI advisor</text>
  <text x="580" y="828" font-family="Georgia, serif" font-size="14" fill="#5A6075" font-style="italic">"Pick option 1. It's the cheapest meaningful protection — at 3.25% of position value, you cap your loss at $1,840 + your existing unrealized P/L. The IV is elevated but reasonable for the news cycle."</text>
  <text x="580" y="912" font-family="Inter, sans-serif" font-size="11" fill="#6E7384">Not financial advice. Powered by Claude Haiku.</text>
