    <rect x="580" y="332" width="160" height="34" rx="4" fill="#B8542A"/>
    <text x="660" y="354" font-size="13" fill="#FFF" font-weight="600" text-anchor="middle">Buy 50 contracts</text>
    <text x="760" y="354" font-size="13" fill="#5A6075">$1,840 total cost</text>
